<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FastJobs - Notificaciones</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .notification-filters {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            background: var(--bg-white);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
        }
        .filter-chip {
            padding: 6px 14px;
            background: var(--bg-primary);
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            border: 1px solid var(--border);
        }
        .filter-chip.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .notification-item {
            background: var(--bg-white);
            margin: 8px 16px;
            padding: 16px;
            border-radius: 16px;
            display: flex;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
            position: relative;
        }
        .notification-item.unread {
            background: var(--accent-light);
            border-left: 4px solid var(--accent);
        }
        .notification-icon {
            width: 48px;
            height: 48px;
            background: var(--bg-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .notification-content {
            flex: 1;
        }
        .notification-title {
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 15px;
        }
        .notification-message {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .notification-time {
            font-size: 11px;
            color: var(--text-secondary);
        }
        .unread-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            position: absolute;
            right: 16px;
            top: 16px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-top">
                <h1 class="logo" style="font-size: 20px;">Notificaciones</h1>
                <button class="icon-btn" id="markAllBtn">
                    <i class="fa-regular fa-check-circle"></i>
                </button>
            </div>
        </header>

        <div class="notification-filters">
            <div class="filter-chip active" data-filter="all">Todas</div>
            <div class="filter-chip" data-filter="service">Servicios</div>
            <div class="filter-chip" data-filter="payment">Pagos</div>
            <div class="filter-chip" data-filter="review">Reseñas</div>
        </div>

        <div id="notificationsList"></div>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <i class="fa-solid fa-house"></i>
                <span>Inicio</span>
            </a>
            <a href="seguimiento.html" class="nav-item">
                <i class="fa-solid fa-truck-fast"></i>
                <span>Seguimiento</span>
            </a>
            <a href="historial.html" class="nav-item">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <span>Historial</span>
            </a>
            <a href="notificaciones.html" class="nav-item active">
                <i class="fa-regular fa-bell"></i>
                <span>Notis</span>
            </a>
            <a href="perfil.html" class="nav-item">
                <i class="fa-regular fa-user"></i>
                <span>Perfil</span>
            </a>
        </nav>
    </div>

    <script>
        let notifications = [
            { id: 1, type: 'service', title: '✅ Tu solicitud fue aceptada', message: 'Juan Pérez aceptó tu solicitud.', time: '10:32 AM', read: false, icon: 'fa-check-circle' },
            { id: 2, type: 'service', title: '🚚 El trabajador está en camino', message: 'Juan Pérez está en camino.', time: '10:40 AM', read: false, icon: 'fa-truck' },
            { id: 3, type: 'service', title: '🔧 Trabajo en proceso', message: 'El servicio ha iniciado.', time: '10:52 AM', read: false, icon: 'fa-wrench' },
            { id: 4, type: 'payment', title: '💳 Pago confirmado', message: 'Tu pago fue confirmado.', time: '12:15 PM', read: false, icon: 'fa-credit-card' },
            { id: 5, type: 'review', title: '⭐ Gracias por tu reseña', message: 'Tu reseña ha sido publicada.', time: '1:00 PM', read: false, icon: 'fa-star' }
        ];

        let currentFilter = 'all';

        function renderNotifications() {
            const container = document.getElementById('notificationsList');
            let filtered = notifications;
            if (currentFilter !== 'all') {
                filtered = notifications.filter(n => n.type === currentFilter);
            }

            container.innerHTML = filtered.map(notif => `
                <div class="notification-item ${!notif.read ? 'unread' : ''}" onclick="markAsRead(${notif.id})">
                    <div class="notification-icon">
                        <i class="fa-regular ${notif.icon}"></i>
                    </div>
                    <div class="notification-content">
                        <div class="notification-title">${notif.title}</div>
                        <div class="notification-message">${notif.message}</div>
                        <div class="notification-time">${notif.time}</div>
                    </div>
                    ${!notif.read ? '<div class="unread-dot"></div>' : ''}
                </div>
            `).join('');
        }

        function markAsRead(id) {
            const notification = notifications.find(n => n.id === id);
            if (notification) notification.read = true;
            renderNotifications();
        }

        function markAllAsRead() {
            notifications.forEach(n => n.read = true);
            renderNotifications();
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderNotifications();
            
            document.querySelectorAll('.filter-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    currentFilter = chip.dataset.filter;
                    renderNotifications();
                });
            });
            
            document.getElementById('markAllBtn')?.addEventListener('click', markAllAsRead);
        });
    </script>
</body>
</html>
